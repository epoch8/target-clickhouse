send_anonymous_usage_stats: true
project_id: "target-clickhouse"
default_environment: test
requires_meltano: ">=4.0"
environments:
- name: test
plugins:
  extractors:
  - name: tap-smoke-test
    variant: meltano
    pip_url: git+https://github.com/meltano/tap-smoke-test.git
    config:
      streams:
      - stream_name: animals
        input_filename: https://raw.githubusercontent.com/meltano/tap-smoke-test/main/demo-data/animals-data.jsonl

  loaders:
  - name: "target-clickhouse"
    namespace: "target_clickhouse"
    pip_url: -e .
    capabilities:
    - about
    - stream-maps
    - schema-flattening
    - structured-logging

    # TODO: Declare settings and their types here:
    settings:
    - name: host
      kind: password
      sensitive: true
      label: ""
      description: ""

    - name: port
      kind: password
      sensitive: true
      label: ""
      description: ""

    - name: username
      kind: password
      sensitive: true
      label: ""
      description: ""

    - name: password
      kind: password
      sensitive: true
      label: ""
      description: ""

    - name: target_schema
      label: ""
      description: ""

    - name: secure
      label: ""
      description: ""

    - name: ca_cert
      label: ""
      description: ""

    - name: send_receive_timeout
      label: ""
      description: ""

    - name: upload_at
      label: ""
      description: ""

    - name: table_config
      label: ""
      description: ""

    - name: replication_method
      label: ""
      description: ""

    - name: optimize
      label: ""
      description: ""


    # TODO: Declare required settings here:
    settings_group_validation:
    - [host, port, username, password]
